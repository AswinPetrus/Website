<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrus Technologies - IIOT Calculators</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    

    <main class="container">
        <header class="page-header">
            <div class="badge glass-badge">
                <span class="user-avatars"></span>
                <span>IIOT Data Analytics</span>
            </div>
            <h1>Intuitive <span class="text-gradient">IIOT</span> Calculators</h1>
            <p>Experience the power of our analytical tools designed to streamline your industrial workflows, predict outcomes, and enhance productivity.</p>
        </header>

        <div style="text-align: center; margin-bottom: 2rem;">
            <span id="result-count" class="tag" style="font-size: 1.1rem; padding: 0.5rem 1.5rem; background: var(--primary-purple); color: white;">Loading Calculators...</span>
        </div>

        <div class="controls-bar glass-panel-inner">
            <input type="text" id="search-input" placeholder="Search by name..." onkeyup="filterCalculators()">
            <select id="product-filter" onchange="filterCalculators()">
                <option value="All">All Products</option>
                <option value="Production Monitoring">Production Monitoring System</option>
                <option value="Condition Monitoring">Condition Monitoring System</option>
                <option value="Control Tower">Control Tower</option>
                <option value="Quality Management">Quality Management System</option>
                <option value="Traceability">Traceability System</option>
                <option value="Energy Monitoring">Energy Monitoring System</option>
            </select>
            <select id="industry-filter" onchange="filterCalculators()">
                <option value="All">All Industries</option>
                <option value="Auto">Auto & Components</option>
                <option value="Pharma">Pharma & Life Sciences</option>
                <option value="FMCG">FMCG & Food Processing</option>
                <option value="Elec">Electronics</option>
                <option value="Heavy">Heavy Engineering</option>
            </select>
            <select id="persona-filter" onchange="filterCalculators()">
                <option value="All">All Personas</option>
                <option value="CXO">CXO / Finance</option>
                <option value="Plant">Plant Head</option>
                <option value="Mainten">Maintenance</option>
                <option value="Operator">Operator</option>
            </select>
        </div>

        <section class="calculators-grid" id="main-grid">
            <!-- Dynamically injected -->
        </section>
    </main>

    <div class="modal-overlay" id="calc-modal">
        <div class="modal-content glass-panel popup-anim">
            <button class="close-btn" onclick="closeCalculator()">&times;</button>
            <div class="modal-header">
                <h2 id="modal-title">Calculator Title</h2>
                <span class="tag" id="modal-category">Category</span>
            </div>
            <div class="modal-body modal-split">
                <div class="calc-form">
                    <div class="calc-description" id="modal-desc">Description goes here.</div>
                    <div id="modal-inputs" class="inputs-grid"></div>
                </div>
                
                <div class="calc-results-section disabled" id="result-container">
                    <div class="chart-container">
                        <canvas id="result-chart"></canvas>
                    </div>
                    <div class="result-box glass-panel-inner mt-4">
                        <h4>Result</h4>
                        <div class="result-value text-gradient" id="result-value">0.00</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary calc-submit" onclick="calculateResult()">Calculate</button>
                <h4 style="margin-top: 2rem;">Related Calculators</h4>
                <div class="related-pills" id="modal-related"></div>
            </div>
        </div>
    </div>

    <script src="./js/app.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
